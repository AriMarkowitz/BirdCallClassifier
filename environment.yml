name: birdcallclassifier
channels:
  - defaults
dependencies:
  - python=3.10
  - pip
  - pip:
    - torch>=2.5.0
    - torchvision
    - torchaudio
    - --extra-index-url https://download.pytorch.org/whl/cu121
    - pytorch_lightning>=1.9.0,<2.0
    - torchlibrosa
    - torchcontrib
    - torchmetrics
    - setuptools<81
    - librosa>=0.11.0
    - soundfile>=0.13.0
    - pandas
    - scikit-learn
    - scipy
    - numpy
    - h5py
    - tensorboard
    - tqdm
    - museval
    - wandb
